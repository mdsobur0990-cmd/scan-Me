<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Scanner AI</title>
    
    <!-- TensorFlow & AI Models -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier@1.2.4"></script>
    
    <style>
        :root { 
            --primary: #2563eb; 
            --bg: #f8fafc; 
            --card: #ffffff; 
            --text: #1e293b;
            --success: #22c55e; 
            --danger: #ef4444; 
            --border: #e2e8f0;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; background: var(--bg); color: var(--text);
            overflow: hidden; touch-action: manipulation;
        }

        /* Loading Screen */
        #loading-overlay { 
            position: fixed; inset: 0; background: #fff; z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .loader { width: 48px; height: 48px; border: 5px solid var(--border); border-bottom-color: var(--primary); border-radius: 50%; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }

        /* Navigation */
        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: #fff; display: flex; border-top: 1px solid var(--border); 
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; color: #94a3b8; font-weight: 600; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 22px; margin-bottom: 4px; font-style: normal; }

        /* Header */
        .header { background: #fff; padding: 16px; text-align: center; font-weight: 800; border-bottom: 1px solid var(--border); font-size: 18px; letter-spacing: -0.5px; }

        /* Screens */
        .screen { height: calc(100vh - 145px); overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .hidden { display: none !important; }

        /* Video Containers */
        .video-wrapper { 
            width: 100%; border-radius: 24px; overflow: hidden; 
            background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            position: relative; border: 4px solid #fff;
        }
        #v-scan-container { height: 45vh; margin-bottom: 20px; }
        #v-train-container { height: 320px; margin: 15px 0; } /* Larger Preview on Add Page */
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Result Card */
        #result-card {
            background: #fff; border-radius: 20px; padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid var(--border);
            text-align: center; transform: scale(0.9); opacity: 0; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #result-card.visible { transform: scale(1); opacity: 1; }
        .price-grid { display: flex; justify-content: space-around; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); }
        .price-item b { display: block; font-size: 12px; color: #64748b; text-transform: uppercase; }
        .price-item span { font-size: 22px; font-weight: 900; }

        /* Round Scan Button */
        .scan-trigger-container { position: absolute; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; }
        .btn-round-scan {
            width: 85px; height: 85px; border-radius: 50%; background: var(--primary);
            border: 6px solid #fff; box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
            color: #fff; font-weight: 800; font-size: 14px; cursor: pointer;
            transition: 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .btn-round-scan:active { transform: scale(0.9); background: #1d4ed8; }

        /* Forms & Buttons */
        .card { background: #fff; border-radius: 24px; padding: 20px; border: 1px solid var(--border); }
        input { 
            width: 100%; padding: 15px; margin: 8px 0; border: 1px solid var(--border); 
            border-radius: 14px; background: #f1f5f9; font-size: 16px; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: var(--primary); }
        .btn { 
            width: 100%; padding: 16px; border-radius: 16px; border: none; 
            font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 10px; transition: 0.2s;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-train { background: #6366f1; color: #fff; }
        .btn-train.active { animation: pulse 1s infinite; background: #4f46e5; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* Inventory List */
        .item-row { 
            background: #fff; padding: 16px; border-radius: 18px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border);
        }
        .item-info b { font-size: 16px; color: var(--text); }
        .item-info p { margin: 4px 0 0; font-size: 13px; color: #64748b; }
        .item-actions { display: flex; gap: 8px; }
        .btn-small { padding: 8px 12px; border-radius: 10px; border: none; font-size: 11px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="loader"></div>
        <p style="margin-top:20px; font-weight:700; color:#64748b;">AI EYES INITIALIZING...</p>
    </div>

    <div class="header">PRO SCANNER AI</div>

    <!-- SCAN PAGE -->
    <div id="scan-screen" class="screen">
        <div class="video-wrapper" id="v-scan-container">
            <video id="v-scan" autoplay playsinline muted></video>
        </div>

        <div id="result-card">
            <div id="d-name" style="font-size: 20px; font-weight: 800; color: var(--primary);">PRODUCT NAME</div>
            <div class="price-grid">
                <div class="price-item">
                    <b>Buy Price</b>
                    <span id="d-buy" style="color: var(--danger);">$0</span>
                </div>
                <div class="price-item" style="border-left: 1px solid var(--border); padding-left: 20px;">
                    <b>Sell Price</b>
                    <span id="d-sell" style="color: var(--success);">$0</span>
                </div>
            </div>
        </div>

        <div class="scan-trigger-container">
            <button class="btn-round-scan" id="hold-scan-btn">SCAN</button>
        </div>
    </div>

    <!-- ADD PAGE -->
    <div id="add-screen" class="screen hidden">
        <div class="card">
            <h3 id="form-title" style="margin-top:0">Add New Product</h3>
            <input type="text" id="i-name" placeholder="Item Name">
            <div style="display:flex; gap:10px">
                <input type="number" id="i-buy" placeholder="Buy $">
                <input type="number" id="i-sell" placeholder="Sell $">
            </div>

            <div class="video-wrapper" id="v-train-container">
                <video id="v-train" autoplay playsinline muted></video>
            </div>
            
            <button class="btn btn-train" id="t-btn">HOLD TO TRAIN AI</button>
            <button class="btn btn-primary" onclick="saveProduct()" style="background:#1e293b">SAVE PRODUCT</button>
            <button id="cancel-edit" class="btn hidden" onclick="resetForm()" style="background:#94a3b8; color:#fff">CANCEL</button>
        </div>
    </div>

    <!-- ITEMS PAGE -->
    <div id="list-screen" class="screen hidden">
        <h3 style="margin: 0 0 15px 10px">Inventory</h3>
        <div id="inv-list"></div>
    </div>

    <!-- NAVIGATION -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="tab('scan-screen', this)"><i>📷</i><span>Scan</span></div>
        <div class="nav-item" onclick="tab('add-screen', this)"><i>➕</i><span>Add</span></div>
        <div class="nav-item" onclick="tab('list-screen', this)"><i>📦</i><span>Items</span></div>
    </div>

    <script>
        let classifier, net, inventory = {}, isTraining = false, isScanning = false, scanActive = true;
        let editingKey = null;

        const dbName = "ProScanner_V3_DB", storeName = "DataStore";

        async function accessDB(mode) {
            return new Promise((resolve) => {
                const request = indexedDB.open(dbName, 1);
                request.onupgradeneeded = e => e.target.result.createObjectStore(storeName);
                request.onsuccess = e => resolve(e.target.result.transaction(storeName, mode).objectStore(storeName));
            });
        }

        async function init() {
            try {
                classifier = knnClassifier.create();
                net = await mobilenet.load();
                
                const store = await accessDB("readonly");
                const savedInv = await new Promise(r => store.get("inv").onsuccess = e => r(e.target.result));
                const savedBrain = await new Promise(r => store.get("brain").onsuccess = e => r(e.target.result));

                if (savedInv) inventory = savedInv;
                if (savedBrain) {
                    const dataset = JSON.parse(savedBrain);
                    Object.keys(dataset).forEach(key => {
                        dataset[key] = tf.tensor2d(dataset[key].data, dataset[key].shape);
                    });
                    classifier.setClassifierDataset(dataset);
                }

                document.getElementById('loading-overlay').style.display = 'none';
                startCam(document.getElementById('v-scan'));
                loop();
            } catch (e) {
                alert("Camera access is required for AI scanning.");
            }
        }

        async function startCam(v) {
            if (v.srcObject) return;
            try {
                const s = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, audio: false 
                });
                v.srcObject = s;
            } catch (e) { console.error("Camera Error"); }
        }

        function tab(id, el) {
            scanActive = (id === 'scan-screen');
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            el.classList.add('active');
            
            if(id === 'add-screen') startCam(document.getElementById('v-train'));
            if(id === 'scan-screen') { startCam(document.getElementById('v-scan')); closeResult(); }
            if(id === 'list-screen') renderList();
        }

        function closeResult() {
            document.getElementById('result-card').classList.remove('visible');
        }

        // --- SCAN LOGIC ---
        const scanBtn = document.getElementById('hold-scan-btn');
        const scanStart = (e) => { e.preventDefault(); isScanning = true; closeResult(); };
        const scanEnd = () => { isScanning = false; };

        scanBtn.onmousedown = scanStart; scanBtn.ontouchstart = scanStart;
        window.onmouseup = scanEnd; window.ontouchend = scanEnd;

        // --- TRAINING LOGIC ---
        const tBtn = document.getElementById('t-btn');
        const trainStart = (e) => {
            e.preventDefault();
            const name = document.getElementById('i-name').value;
            if(!name) return alert("Please enter product name first");
            isTraining = true;
            tBtn.classList.add('active');
            tBtn.innerText = "TRAINING...";
            trainLoop();
        };
        const trainEnd = () => { isTraining = false; tBtn.classList.remove('active'); tBtn.innerText = "HOLD TO TRAIN AI"; };

        tBtn.onmousedown = trainStart; tBtn.ontouchstart = trainStart;
        window.onmouseup = trainEnd; window.ontouchend = trainEnd;

        async function trainLoop() {
            if(!isTraining) return;
            const img = await net.infer(document.getElementById('v-train'), 'conv_preds');
            classifier.addExample(img, document.getElementById('i-name').value);
            setTimeout(trainLoop, 100);
        }

        // --- INVENTORY & DATABASE ---
        async function saveProduct() {
            const name = document.getElementById('i-name').value.trim();
            const buy = document.getElementById('i-buy').value;
            const sell = document.getElementById('i-sell').value;

            if(!name || !buy || !sell) return alert("All fields are required");
            if(classifier.getNumClasses() === 0) return alert("AI must be trained for this item first");

            inventory[name] = { buy, sell };
            const store = await accessDB("readwrite");
            store.put(inventory, "inv");
            
            const dataset = classifier.getClassifierDataset();
            const brainObj = {};
            Object.keys(dataset).forEach(key => {
                brainObj[key] = { data: Array.from(dataset[key].dataSync()), shape: dataset[key].shape };
            });
            store.put(JSON.stringify(brainObj), "brain");

            alert("Product successfully saved!");
            resetForm();
            tab('list-screen', document.querySelectorAll('.nav-item')[2]);
        }

        function renderList() {
            const list = document.getElementById('inv-list');
            const items = Object.keys(inventory);
            list.innerHTML = items.length === 0 ? '<p style="text-align:center;color:#94a3b8;margin-top:50px">No items saved yet.</p>' :
                items.map(k => `
                    <div class="item-row">
                        <div class="item-info">
                            <b>${k}</b>
                            <p>Buy: $${inventory[k].buy} | Sell: $${inventory[k].sell}</p>
                        </div>
                        <div class="item-actions">
                            <button class="btn-small" style="background:#eff6ff;color:#2563eb" onclick="editItem('${k}')">Edit</button>
                            <button class="btn-small" style="background:#fef2f2;color:#ef4444" onclick="deleteItem('${k}')">Delete</button>
                        </div>
                    </div>
                `).join('');
        }

        function editItem(name) {
            editingKey = name;
            const item = inventory[name];
            document.getElementById('i-name').value = name;
            document.getElementById('i-buy').value = item.buy;
            document.getElementById('i-sell').value = item.sell;
            document.getElementById('form-title').innerText = "Edit Product";
            document.getElementById('cancel-edit').classList.remove('hidden');
            tab('add-screen', document.querySelectorAll('.nav-item')[1]);
        }

        function resetForm() {
            editingKey = null;
            document.getElementById('i-name').value = '';
            document.getElementById('i-buy').value = '';
            document.getElementById('i-sell').value = '';
            document.getElementById('form-title').innerText = "Add New Product";
            document.getElementById('cancel-edit').classList.add('hidden');
        }

        async function deleteItem(name) {
            if(!confirm(`Delete ${name} from inventory?`)) return;
            delete inventory[name];
            const store = await accessDB("readwrite");
            store.put(inventory, "inv");
            renderList();
        }

        // --- AI PREDICTION LOOP ---
        async function loop() {
            if (scanActive && isScanning && classifier.getNumClasses() > 0) {
                try {
                    const img = await net.infer(document.getElementById('v-scan'), 'conv_preds');
                    const res = await classifier.predictClass(img);
                    const confidence = res.confidences[res.label];

                    if (confidence > 0.85) {
                        const item = inventory[res.label];
                        if (item) {
                            document.getElementById('d-name').innerText = res.label.toUpperCase();
                            document.getElementById('d-buy').innerText = `$${item.buy}`;
                            document.getElementById('d-sell').innerText = `$${item.sell}`;
                            document.getElementById('result-card').classList.add('visible');
                        }
                    }
                } catch(e) {}
            }
            requestAnimationFrame(loop);
        }

        init();
    </script>
</body>
</html>
