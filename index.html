<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Scanner AI</title>
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier@1.2.4"></script>
    
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --success: #22c55e; --danger: #ef4444; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); padding-bottom: 90px; overflow-x: hidden; touch-action: manipulation; }
        .header { background: var(--card); padding: 18px; text-align: center; box-shadow: 0 1px 2px rgba(0,0,0,0.05); font-weight: 800; position: sticky; top: 0; z-index: 100; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .video-box { width: 100%; border-radius: 20px; overflow: hidden; background: #000; line-height: 0; box-shadow: 0 10px 15px rgba(0,0,0,0.1); position: relative; aspect-ratio: 4/3; }
        video { width: 100%; height: 100%; object-fit: cover; } 
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; cursor: pointer; margin: 8px 0; transition: 0.2s; }
        
        /* Scan Button Styles */
        .btn-scan-main { background: var(--primary); height: 70px; font-size: 18px; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
        .btn-scan-main.active { background: #1d4ed8; transform: scale(0.95); box-shadow: inset 0 2px 10px rgba(0,0,0,0.2); }
        
        .btn-train { background: var(--success); }
        .btn-train.active { background: #16a34a; transform: scale(0.95); animation: pulse 1s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        
        .price-badge { background: #f0f9ff; padding: 16px; border-radius: 15px; margin-top: 15px; border-left: 6px solid var(--success); animation: slideIn 0.3s ease; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; padding: 10px 0 25px 0; border-top: 1px solid #e2e8f0; z-index: 100; }
        .nav-item { text-align: center; font-size: 11px; color: #94a3b8; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        .hidden { display: none !important; }
        .inv-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #f1f5f9; }
        .del-btn { background: #fee2e2; color: var(--danger); padding: 8px 12px; border-radius: 8px; font-size: 11px; width: auto; margin: 0; }
        
        #loading-overlay { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">PRO SCANNER AI</div>
        <div id="load-status">Downloading AI Eyes...</div>
    </div>

    <div class="header">PRO SCANNER AI</div>

    <!-- SCAN SCREEN -->
    <div id="scan-screen" class="container">
        <div class="card">
            <div class="video-box"><video id="v-scan" autoplay playsinline muted></video></div>
            
            <div id="status" style="text-align:center; margin:15px; font-weight:600; color:#64748b;">Finding subjects to scan</div>
            
            <div id="result" class="price-badge hidden">
                <div style="color:var(--danger); font-size:12px; font-weight:bold;">BUY: $<span id="d-buy">0</span></div>
                <div style="color:var(--success); font-size:28px; font-weight:900;">SELL: $<span id="d-sell">0</span></div>
                <div id="d-name" style="font-size:18px; font-weight:bold; color:#1e293b;">NAME</div>
            </div>

            <!-- THE SCAN BUTTON -->
            <button class="btn-scan-main" id="hold-scan-btn">HOLD TO SCAN ITEM</button>
        </div>
    </div>

    <!-- ADD SCREEN -->
    <div id="add-screen" class="container hidden">
        <div class="card">
            <h3>Add New Product</h3>
            <input type="text" id="i-name" placeholder="Product Name">
            <input type="number" id="i-buy" placeholder="Buy Price $">
            <input type="number" id="i-sell" placeholder="Sell Price $">
            <div class="video-box" style="height:180px; margin:10px 0;"><video id="v-train" autoplay playsinline muted></video></div>
            <button class="btn-train" id="t-btn">HOLD TO TRAIN AI</button>
            <button onclick="saveProduct()" style="background:#1e293b;">SAVE PRODUCT</button>
        </div>
    </div>

    <!-- LIST SCREEN -->
    <div id="list-screen" class="container hidden">
        <div class="card">
            <h3>Inventory</h3>
            <div id="inv-list"></div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="tab('scan-screen', this)">📷<br>Scan</div>
        <div class="nav-item" onclick="tab('add-screen', this)">➕<br>Add</div>
        <div class="nav-item" onclick="tab('list-screen', this)">📦<br>Items</div>
    </div>

    <script>
        let classifier, net, inventory = {}, isTraining = false, isScanning = false, scanActive = true;
        const vScan = document.getElementById('v-scan');
        const vTrain = document.getElementById('v-train');
        const statusText = document.getElementById('status');
        const resultBadge = document.getElementById('result');

        const dbName = "ScannerAI_DB", storeName = "MainStore";
        async function accessDB(mode) {
            return new Promise((resolve) => {
                const request = indexedDB.open(dbName, 1);
                request.onupgradeneeded = e => e.target.result.createObjectStore(storeName);
                request.onsuccess = e => resolve(e.target.result.transaction(storeName, mode).objectStore(storeName));
            });
        }

        async function init() {
            try {
                classifier = knnClassifier.create();
                net = await mobilenet.load();
                const store = await accessDB("readonly");
                const savedInv = await new Promise(r => store.get("inv").onsuccess = e => r(e.target.result));
                const savedBrain = await new Promise(r => store.get("brain").onsuccess = e => r(e.target.result));

                if (savedInv) inventory = savedInv;
                if (savedBrain) {
                    const dataset = JSON.parse(savedBrain);
                    Object.keys(dataset).forEach(key => {
                        dataset[key] = tf.tensor2d(dataset[key].data, dataset[key].shape);
                    });
                    classifier.setClassifierDataset(dataset);
                }
                document.getElementById('loading-overlay').style.display = 'none';
                startCam(vScan);
                loop();
            } catch (e) {
                document.getElementById('load-status').innerText = "Refresh and allow camera.";
            }
        }

        async function startCam(v) {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
                v.srcObject = s;
            } catch (e) { alert("Camera Error"); }
        }

        function tab(id, el) {
            scanActive = (id === 'scan-screen');
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            el.classList.add('active');
            if(id === 'add-screen') startCam(vTrain);
            if(id === 'scan-screen') { resetUI(); startCam(vScan); }
        }

        function resetUI() {
            resultBadge.classList.add('hidden');
            statusText.innerText = "Finding subjects to scan";
            statusText.style.color = "#64748b";
        }

        // --- SCAN HOLD LOGIC ---
        const scanBtn = document.getElementById('hold-scan-btn');
        const startScanning = (e) => { e.preventDefault(); isScanning = true; scanBtn.classList.add('active'); };
        const stopScanning = () => { isScanning = false; scanBtn.classList.remove('active'); resetUI(); };

        scanBtn.onmousedown = startScanning; scanBtn.onmouseup = stopScanning;
        scanBtn.ontouchstart = startScanning; scanBtn.ontouchend = stopScanning;

        // --- TRAIN HOLD LOGIC ---
        const tBtn = document.getElementById('t-btn');
        const startT = (e) => { 
            e.preventDefault(); 
            if(!document.getElementById('i-name').value) return alert("Enter name first"); 
            isTraining = true; tBtn.classList.add('active'); trainLoop(); 
        };
        const stopT = () => { isTraining = false; tBtn.classList.remove('active'); };
        
        tBtn.onmousedown = startT; tBtn.onmouseup = stopT;
        tBtn.ontouchstart = startT; tBtn.ontouchend = stopT;

        async function trainLoop() {
            if(!isTraining) return;
            const img = await net.infer(vTrain, 'conv_preds');
            classifier.addExample(img, document.getElementById('i-name').value);
            setTimeout(trainLoop, 100);
        }

        async function saveProduct() {
            const name = document.getElementById('i-name').value;
            const buy = document.getElementById('i-buy').value;
            const sell = document.getElementById('i-sell').value;
            if(!name || !buy || !sell) return alert("Fill all fields");
            
            inventory[name] = { buy, sell };
            const dataset = classifier.getClassifierDataset();
            const brainObj = {};
            Object.keys(dataset).forEach(key => {
                brainObj[key] = { data: Array.from(dataset[key].dataSync()), shape: dataset[key].shape };
            });
            const store = await accessDB("readwrite");
            store.put(inventory, "inv");
            store.put(JSON.stringify(brainObj), "brain");
            alert("Product Saved!");
            document.getElementById('i-name').value = ''; document.getElementById('i-buy').value = ''; document.getElementById('i-sell').value = '';
        }

        // --- MAIN LOOP ---
        async function loop() {
            if (scanActive && isScanning) {
                if (classifier.getNumClasses() > 0) {
                    try {
                        const img = await net.infer(vScan, 'conv_preds');
                        const res = await classifier.predictClass(img);
                        const confidence = res.confidences[res.label];

                        if (confidence > 0.85) {
                            const item = inventory[res.label];
                            document.getElementById('d-name').innerText = res.label.toUpperCase();
                            document.getElementById('d-buy').innerText = item.buy;
                            document.getElementById('d-sell').innerText = item.sell;
                            resultBadge.classList.remove('hidden');
                            statusText.innerText = "Match Found!";
                            statusText.style.color = "var(--success)";
                        } else {
                            resultBadge.classList.add('hidden');
                            statusText.innerText = "Product isn't registered";
                            statusText.style.color = "var(--danger)";
                        }
                    } catch(e) {}
                } else {
                    statusText.innerText = "No products saved to AI yet.";
                }
            }
            requestAnimationFrame(loop);
        }

        function renderList() {
            const list = document.getElementById('inv-list');
            list.innerHTML = Object.keys(inventory).length === 0 ? '<p>No items saved.</p>' : 
                Object.keys(inventory).map(k => `
                    <div class="inv-item">
                        <div><b>${k}</b><br><small>$${inventory[k].buy} / $${inventory[k].sell}</small></div>
                        <button class="del-btn" onclick="deleteItem('${k}')">Remove</button>
                    </div>
                `).join('');
        }

        async function deleteItem(name) {
            if(!confirm("Delete " + name + "?")) return;
            delete inventory[name];
            const store = await accessDB("readwrite");
            store.put(inventory, "inv");
            renderList();
        }

        init();
    </script>
</body>
</html>
