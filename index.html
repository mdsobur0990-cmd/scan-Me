<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Scanner AI</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier@1.2.4"></script>
    
    <style>
        :root { 
            --primary: #2563eb; 
            --bg: #f1f5f9; 
            --card: #ffffff; 
            --text: #0f172a;
            --text-light: #64748b;
            --success: #16a34a; 
            --danger: #dc2626; 
            --border: #e2e8f0;
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: var(--text);
            overflow: hidden; 
            touch-action: manipulation;
        }

        /* Loading Screen */
        #loading-overlay { 
            position: fixed; inset: 0; background: #ffffff; z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .spinner { border: 4px solid var(--border); border-left-color: var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Header */
        .header { background: var(--card); padding: 15px; text-align: center; font-weight: 800; font-size: 1.1rem; border-bottom: 1px solid var(--border); }

        /* Main View Container */
        .view { height: calc(100vh - 135px); overflow-y: auto; position: relative; }

        /* Scan Screen Styles */
        #scan-screen { overflow: hidden; background: var(--bg); }
        .camera-box { 
            width: 90%; height: 50vh; margin: 15px auto; 
            background: #000; border-radius: 24px; overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            position: relative; border: 4px solid var(--card);
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Real-time Info Card */
        .info-card {
            width: 85%; margin: 0 auto; background: var(--card); 
            border-radius: 20px; padding: 20px; box-sizing: border-box;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            transform: translateY(20px); opacity: 0; transition: 0.3s all ease;
            border: 1px solid var(--border);
        }
        .info-card.active { transform: translateY(0); opacity: 1; }
        
        .price-row { display: flex; justify-content: space-between; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
        .price-box { text-align: center; flex: 1; }
        .price-label { font-size: 11px; color: var(--text-light); text-transform: uppercase; font-weight: bold; }
        .price-val { font-size: 1.4rem; font-weight: 800; }

        /* Controls */
        .controls { position: absolute; bottom: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .btn-scan { 
            background: var(--primary); color: white; border: none; 
            padding: 15px 40px; border-radius: 50px; font-weight: 800; font-size: 1rem;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4);
            transition: 0.1s; cursor: pointer;
        }
        .btn-scan:active { transform: scale(0.95); background: #1d4ed8; }

        /* Forms & List */
        .container { padding: 20px; }
        .form-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); }
        input { 
            width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--border); 
            border-radius: 12px; background: #f8fafc; font-size: 16px; box-sizing: border-box;
        }
        .btn-block { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }

        /* Inventory List */
        .inv-item { 
            background: var(--card); padding: 16px; border-radius: 16px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid var(--border);
        }
        .inv-details b { font-size: 1rem; color: var(--text); }
        .inv-details p { margin: 4px 0 0; font-size: 13px; color: var(--text-light); }
        .action-btns { display: flex; gap: 8px; }
        .btn-small { padding: 8px 12px; border-radius: 8px; border: none; font-size: 11px; font-weight: bold; }
        .edit-btn { background: #eff6ff; color: var(--primary); }
        .del-btn { background: #fef2f2; color: var(--danger); }

        /* Nav Bar */
        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; height: 75px;
            background: var(--card); display: flex; border-top: 1px solid var(--border); 
            padding-bottom: 10px;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: var(--text-light); font-weight: 500; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; font-style: normal; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top:15px; font-weight: 600; color: var(--text-light);">Loading AI Engine...</p>
    </div>

    <div class="header">PRO SCANNER AI</div>

    <!-- SCAN SCREEN -->
    <div id="scan-screen" class="view">
        <div class="camera-box">
            <video id="v-scan" autoplay playsinline muted></video>
        </div>

        <div id="info-card" class="info-card">
            <div id="d-name" style="font-size: 1.2rem; font-weight: 800;">Product Name</div>
            <div class="price-row">
                <div class="price-box">
                    <div class="price-label">Buy Price</div>
                    <div class="price-val" style="color: var(--danger);">$<span id="d-buy">0</span></div>
                </div>
                <div class="price-box" style="border-left: 1px solid var(--border);">
                    <div class="price-label">Sell Price</div>
                    <div class="price-val" style="color: var(--success);">$<span id="d-sell">0</span></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <p id="status-msg" style="margin-bottom: 10px; font-size: 13px; color: var(--text-light); font-weight: 600;">Ready to Scan</p>
            <button class="btn-scan" id="hold-scan-btn">HOLD TO SCAN</button>
        </div>
    </div>

    <!-- ADD SCREEN -->
    <div id="add-screen" class="view container hidden">
        <div class="form-card">
            <h3 id="form-title" style="margin-top:0;">Add Product</h3>
            <input type="text" id="i-name" placeholder="Item Name">
            <div style="display:flex; gap:10px;">
                <input type="number" id="i-buy" placeholder="Buy Price $">
                <input type="number" id="i-sell" placeholder="Sell Price $">
            </div>
            
            <div style="border-radius:15px; overflow:hidden; height:140px; margin: 10px 0; border: 2px solid var(--bg);">
                <video id="v-train" autoplay playsinline muted style="width:100%; height:100%; object-fit:cover;"></video>
            </div>
            
            <button class="btn-block btn-primary" id="t-btn" style="background: #6366f1;">HOLD TO TRAIN AI</button>
            <button onclick="saveProduct()" class="btn-block btn-success">SAVE TO INVENTORY</button>
            <button onclick="cancelEdit()" id="cancel-btn" class="btn-block hidden" style="background:#94a3b8; color:white;">CANCEL EDIT</button>
        </div>
    </div>

    <!-- LIST SCREEN -->
    <div id="list-screen" class="view container hidden">
        <h3 style="margin: 0 0 15px 5px;">Inventory</h3>
        <div id="inv-list"></div>
    </div>

    <!-- NAVIGATION -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="tab('scan-screen', this)"><i>📷</i>Scan</div>
        <div class="nav-item" onclick="tab('add-screen', this)"><i>➕</i>Add</div>
        <div class="nav-item" onclick="tab('list-screen', this)"><i>📦</i>Items</div>
    </div>

    <script>
        let classifier, net, inventory = {}, isTraining = false, isScanning = false, scanActive = true;
        let editingKey = null;

        const dbName = "ProScanner_WhiteDB", storeName = "MainStore";

        async function accessDB(mode) {
            return new Promise((resolve) => {
                const request = indexedDB.open(dbName, 1);
                request.onupgradeneeded = e => e.target.result.createObjectStore(storeName);
                request.onsuccess = e => resolve(e.target.result.transaction(storeName, mode).objectStore(storeName));
            });
        }

        async function init() {
            try {
                classifier = knnClassifier.create();
                net = await mobilenet.load();
                
                const store = await accessDB("readonly");
                const savedInv = await new Promise(r => store.get("inv").onsuccess = e => r(e.target.result));
                const savedBrain = await new Promise(r => store.get("brain").onsuccess = e => r(e.target.result));

                if (savedInv) inventory = savedInv;
                if (savedBrain) {
                    const dataset = JSON.parse(savedBrain);
                    Object.keys(dataset).forEach(key => {
                        dataset[key] = tf.tensor2d(dataset[key].data, dataset[key].shape);
                    });
                    classifier.setClassifierDataset(dataset);
                }

                document.getElementById('loading-overlay').style.display = 'none';
                startCam(document.getElementById('v-scan'));
                loop();
            } catch (e) {
                document.getElementById('loading-overlay').innerHTML = "Camera permission required.";
            }
        }

        async function startCam(v) {
            if (v.srcObject) return; 
            try {
                const s = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                v.srcObject = s;
            } catch (e) { console.log("Cam error"); }
        }

        function tab(id, el) {
            scanActive = (id === 'scan-screen');
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            el.classList.add('active');
            
            if(id === 'add-screen') startCam(document.getElementById('v-train'));
            if(id === 'scan-screen') { startCam(document.getElementById('v-scan')); resetScanUI(); }
            if(id === 'list-screen') renderList();
        }

        function resetScanUI() {
            document.getElementById('info-card').classList.remove('active');
            document.getElementById('status-msg').innerText = "Ready to Scan";
        }

        // --- SCAN HOLD LOGIC ---
        const scanBtn = document.getElementById('hold-scan-btn');
        const onScanStart = (e) => { e.preventDefault(); isScanning = true; resetScanUI(); };
        const onScanEnd = () => { isScanning = false; };

        scanBtn.onmousedown = onScanStart; scanBtn.ontouchstart = onScanStart;
        window.onmouseup = onScanEnd; window.ontouchend = onScanEnd;

        // --- TRAINING HOLD LOGIC ---
        const tBtn = document.getElementById('t-btn');
        const onTrainStart = (e) => {
            e.preventDefault();
            if(!document.getElementById('i-name').value) return alert("Enter name first");
            isTraining = true;
            tBtn.innerText = "TRAINING... KEEP MOVING";
            trainLoop();
        };
        const onTrainEnd = () => { isTraining = false; tBtn.innerText = "HOLD TO TRAIN AI"; };

        tBtn.onmousedown = onTrainStart; tBtn.ontouchstart = onTrainStart;
        window.onmouseup = onTrainEnd; window.ontouchend = onTrainEnd;

        async function trainLoop() {
            if(!isTraining) return;
            const img = await net.infer(document.getElementById('v-train'), 'conv_preds');
            classifier.addExample(img, document.getElementById('i-name').value);
            setTimeout(trainLoop, 100);
        }

        // --- DATABASE OPERATIONS ---
        async function saveProduct() {
            const name = document.getElementById('i-name').value.trim();
            const buy = document.getElementById('i-buy').value;
            const sell = document.getElementById('i-sell').value;

            if(!name || !buy || !sell) return alert("Missing info");
            if(classifier.getNumClasses() === 0) return alert("Train AI first");

            inventory[name] = { buy, sell };
            const store = await accessDB("readwrite");
            store.put(inventory, "inv");
            
            const dataset = classifier.getClassifierDataset();
            const brainObj = {};
            Object.keys(dataset).forEach(key => {
                brainObj[key] = { data: Array.from(dataset[key].dataSync()), shape: dataset[key].shape };
            });
            store.put(JSON.stringify(brainObj), "brain");

            alert("Product Saved!");
            cancelEdit();
            tab('list-screen', document.querySelectorAll('.nav-item')[2]);
        }

        function renderList() {
            const list = document.getElementById('inv-list');
            const keys = Object.keys(inventory);
            list.innerHTML = keys.length === 0 ? '<p style="text-align:center; color:#94a3b8; margin-top:40px;">No items in database</p>' : 
                keys.map(k => `
                    <div class="inv-item">
                        <div class="inv-details">
                            <b>${k}</b>
                            <p>Buy: $${inventory[k].buy} | Sell: $${inventory[k].sell}</p>
                        </div>
                        <div class="action-btns">
                            <button class="btn-small edit-btn" onclick="editItem('${k}')">Edit</button>
                            <button class="btn-small del-btn" onclick="deleteItem('${k}')">Delete</button>
                        </div>
                    </div>
                `).join('');
        }

        function editItem(name) {
            editingKey = name;
            const item = inventory[name];
            document.getElementById('i-name').value = name;
            document.getElementById('i-buy').value = item.buy;
            document.getElementById('i-sell').value = item.sell;
            document.getElementById('form-title').innerText = "Edit Product";
            document.getElementById('cancel-btn').classList.remove('hidden');
            tab('add-screen', document.querySelectorAll('.nav-item')[1]);
        }

        function cancelEdit() {
            editingKey = null;
            document.getElementById('i-name').value = '';
            document.getElementById('i-buy').value = '';
            document.getElementById('i-sell').value = '';
            document.getElementById('form-title').innerText = "Add Product";
            document.getElementById('cancel-btn').classList.add('hidden');
        }

        async function deleteItem(name) {
            if(!confirm(`Delete ${name}?`)) return;
            delete inventory[name];
            const store = await accessDB("readwrite");
            store.put(inventory, "inv");
            renderList();
        }

        // --- REAL TIME LOOP ---
        async function loop() {
            if (scanActive && isScanning && classifier.getNumClasses() > 0) {
                try {
                    const img = await net.infer(document.getElementById('v-scan'), 'conv_preds');
                    const res = await classifier.predictClass(img);
                    const conf = res.confidences[res.label];

                    if (conf > 0.85) {
                        const item = inventory[res.label];
                        if (item) {
                            document.getElementById('d-name').innerText = res.label.toUpperCase();
                            document.getElementById('d-buy').innerText = item.buy;
                            document.getElementById('d-sell').innerText = item.sell;
                            document.getElementById('info-card').classList.add('active');
                            document.getElementById('status-msg').innerText = "Product Identified!";
                        }
                    } else {
                        document.getElementById('status-msg').innerText = "Scanning...";
                    }
                } catch(e) {}
            }
            requestAnimationFrame(loop);
        }

        init();
    </script>
</body>
</html>
